# ---------------------------------------------------------------------------
# code-server — Caddy site block (reference)
#
# ONE vhost for every developer. Keycloak decides who you are; Caddy routes you
# to your own backend and nobody else's. To activate, append this block to the
# Caddy host's `caddy_domains` list (e.g. in host_vars/<caddy-host>/caddy.yml)
# — do NOT deploy it from the code_server role.
#
# Prerequisites on the Caddy host, both provided by the `caddy` role:
#   * a `caddy_oauth2_proxies` entry named `code` for this domain, and
#   * the `(idm_caddy_acme_ca)` snippet imported below.
#
# oauth2-proxy-code shares caddy.network with Caddy, so it resolves by container
# name and publishes NO host port — nothing on the LAN can reach the auth proxy.
#
# code-server needs a WebSocket upgrade for its terminal and file watcher;
# Caddy's `reverse_proxy` handles that transparently, so no extra directives.
# ---------------------------------------------------------------------------

code.lab.example.org {
    import idm_caddy_acme_ca

    # oauth2-proxy's own endpoints: sign-in, callback, sign-out.
    handle /oauth2/* {
        reverse_proxy http://oauth2-proxy-code:4180
    }

    handle {
        # route{} pins directive order. `request_header` otherwise sorts AFTER
        # `forward_auth` in Caddy's default order and would delete the very
        # headers forward_auth just copied.
        route {
            # A client may send its own X-Auth-Request-*. Strip before we trust
            # anything: forward_auth's copy_headers overwrites what oauth2-proxy
            # returns, but a header it does NOT return would otherwise survive.
            request_header -X-Auth-Request-*

            forward_auth http://oauth2-proxy-code:4180 {
                uri /oauth2/auth
                copy_headers X-Auth-Request-Preferred-Username X-Auth-Request-Email X-Auth-Request-Groups

                # /oauth2/auth answers 401 when there is no session; send the
                # browser to sign in and come back where it started.
                #
                # Match 401 ONLY, never 4xx. A user who signs in but is not in
                # code-server-users gets 403 here, and 403 must fall through to
                # the browser: redirecting it to /oauth2/start would bounce off
                # their already-valid session and loop forever.
                @unauthenticated status 401
                handle_response @unauthenticated {
                    redir * /oauth2/start?rd={scheme}://{host}{uri}
                }
            }

            # Gate 2 of 2 — identity to workspace. (Gate 1 is oauth2-proxy
            # checking the `groups` claim for code-server-users.) The username
            # is the Keycloak preferred_username, i.e. the IdM uid, and must
            # equal that developer's code_server_users[].username.
            @alice header X-Auth-Request-Preferred-Username alice
            reverse_proxy @alice http://10.0.10.11:8443

            @bob header X-Auth-Request-Preferred-Username bob
            reverse_proxy @bob http://10.0.10.11:8444

            # Authenticated, in code-server-users, but no workspace provisioned.
            respond "No code-server workspace is provisioned for your account." 403
        }
    }
}
