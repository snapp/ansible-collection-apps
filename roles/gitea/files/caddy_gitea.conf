# ---------------------------------------------------------------------------
# Gitea — Caddy site block (reference)
#
# Caddy runs as its own rootless container (see the `caddy` role). To activate
# this, append the block below to that role's `caddy_domains` list (e.g. in
# group_vars/ite.yml) — do NOT deploy it from the gitea role. Update the
# hostname to match gitea_domain.
#
# TLS uses the Let's Encrypt DNS-01 challenge so the cert is issued without ever
# exposing port 80. The Cloudflare DNS plugin must be built into the Caddy image:
#   xcaddy build --with github.com/caddy-dns/cloudflare
# and the token supplied to the Caddy container as an env var / Podman secret:
#   CLOUDFLARE_API_TOKEN=<scoped token: Zone.DNS:Edit on ite.example.org>
#
# Only HTTP is proxied. git-over-SSH is a raw TCP stream Caddy does not handle;
# clients reach it directly on the host at gitea_ssh_host_port (default 2222).
# Caddy reaches Gitea's localhost-published HTTP port through the host gateway
# alias host.containers.internal.
# ---------------------------------------------------------------------------

git.ite.example.org {
    tls {
        dns cloudflare {env.CLOUDFLARE_API_TOKEN}
        resolvers 1.1.1.1
    }

    # Gitea web UI + HTTP git transport + REST API
    reverse_proxy host.containers.internal:3000
}
