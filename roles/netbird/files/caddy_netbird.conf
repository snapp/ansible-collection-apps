# ---------------------------------------------------------------------------
# NetBird — Caddy site block (reference)
#
# Caddy runs as its own rootless container (see the `caddy` role). To activate
# this, append the rendered block below to that role's `caddy_domains` list
# (e.g. in group_vars/ite.yml) — do NOT deploy it from the netbird role.
#
# TLS uses the Let's Encrypt DNS-01 challenge so the cert is issued without ever
# exposing port 80. The Cloudflare DNS plugin must be built into the Caddy image:
#   xcaddy build --with github.com/caddy-dns/cloudflare
# and the token supplied to the Caddy container as an env var / Podman secret:
#   CLOUDFLARE_API_TOKEN=<scoped token: Zone.DNS:Edit on ite.example.org>
#
# Caddy reaches the localhost-published NetBird ports through the host gateway
# alias `host.containers.internal`. gRPC paths are proxied over h2c (cleartext
# HTTP/2) because Management/Signal speak plain HTTP behind the proxy.
# ---------------------------------------------------------------------------

netbird.ite.example.org {
    tls {
        dns cloudflare {env.CLOUDFLARE_API_TOKEN}
        resolvers 1.1.1.1
    }

    # Management gRPC (peer control channel)
    reverse_proxy /management.ManagementService/* h2c://host.containers.internal:8091

    # Signal gRPC (handshake exchange)
    reverse_proxy /signalexchange.SignalExchange/* h2c://host.containers.internal:8092

    # Management REST API
    reverse_proxy /api/* host.containers.internal:8091

    # Dashboard SPA (catch-all — Caddy evaluates this last by specificity)
    reverse_proxy /* host.containers.internal:8090
}
